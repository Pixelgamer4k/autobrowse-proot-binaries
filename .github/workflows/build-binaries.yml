name: Build VPC Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. v1.2.1-binaries'
        required: true
        type: string

permissions:
  contents: write

env:
  ALPINE_VERSION: 3.19.0
  TERMUX_PROOT_AARCH64: pool/main/p/proot/proot_5.1.107.78-1_aarch64.deb
  TERMUX_PROOT_ARM: pool/main/p/proot/proot_5.1.107.78-1_arm.deb
  TERMUX_TALLOC_AARCH64: pool/main/libt/libtalloc/libtalloc_2.4.3_aarch64.deb
  TERMUX_TALLOC_ARM: pool/main/libt/libtalloc/libtalloc_2.4.3_arm.deb
  TERMUX_SHMEM_AARCH64: pool/main/liba/libandroid-shmem/libandroid-shmem_0.7_aarch64.deb
  TERMUX_SHMEM_ARM: pool/main/liba/libandroid-shmem/libandroid-shmem_0.7_arm.deb

jobs:
  build-rootfs:
    name: Build Alpine XFCE rootfs for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64
            alpine_arch: aarch64
          - target: arm
            alpine_arch: armv7
    steps:
      - name: Download prebuilt Termux proot + dependencies
        run: |
          mkdir -p debs
          if [ "${{ matrix.target }}" = "aarch64" ]; then
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_PROOT_AARCH64}" -O debs/proot.deb
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_TALLOC_AARCH64}" -O debs/libtalloc.deb
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_SHMEM_AARCH64}" -O debs/libandroid-shmem.deb
          else
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_PROOT_ARM}" -O debs/proot.deb
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_TALLOC_ARM}" -O debs/libtalloc.deb
            wget -q "https://packages.termux.dev/apt/termux-main/${TERMUX_SHMEM_ARM}" -O debs/libandroid-shmem.deb
          fi
          ls -la debs/

      - name: Extract proot + shared libraries
        run: |
          mkdir -p dist/${{ matrix.target }}
          for deb in debs/*.deb; do
            echo "Extracting $deb"
            dpkg-deb -x "$deb" extract/
          done
          find extract -type f -name proot -exec cp {} dist/${{ matrix.target }}/proot \;
          find extract -type f \( -name 'libtalloc.so*' -o -name 'libandroid-shmem.so*' \) -exec cp {} dist/${{ matrix.target }}/ \;
          ls -la dist/${{ matrix.target }}/

      - name: Download Alpine minirootfs
        run: |
          url="https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/${{ matrix.alpine_arch }}/alpine-minirootfs-${{ env.ALPINE_VERSION }}-${{ matrix.alpine_arch }}.tar.gz"
          echo "Downloading $url"
          wget -q "$url" -O alpine-minirootfs.tar.gz
          mkdir -p rootfs
          tar -xzf alpine-minirootfs.tar.gz -C rootfs

      - name: Register QEMU binfmt
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Install XFCE desktop and VNC stack
        run: |
          sudo mkdir -p rootfs/proc rootfs/dev rootfs/sys
          sudo mount -t proc proc rootfs/proc
          sudo mount --rbind /dev rootfs/dev
          sudo mount --rbind /sys rootfs/sys
          sudo cp /etc/resolv.conf rootfs/etc/resolv.conf
          sudo chroot rootfs /bin/sh -c '
            set -e
            apk update
            apk add --no-cache bash xfce4 xfce4-terminal tigervnc novnc websockify xterm ttf-dejavu dbus
            mkdir -p /root/.vnc
            printf "autobrowse" | vncpasswd -f > /root/.vnc/passwd
            chmod 600 /root/.vnc/passwd
            printf "%s\n" "#!/bin/sh" "unset SESSION_MANAGER" "unset DBUS_SESSION_BUS_ADDRESS" "exec startxfce4" > /root/.vnc/xstartup
            chmod +x /root/.vnc/xstartup
            rm -rf /var/cache/apk/* /tmp/* /var/tmp/* /usr/share/doc/* /usr/share/man/* /usr/share/info/*
          '
          sudo umount rootfs/proc || true
          sudo umount rootfs/dev || true
          sudo umount rootfs/sys || true

      - name: Package rootfs
        run: |
          sudo tar --exclude='./proc' --exclude='./dev' --exclude='./sys' --exclude='./run' \
              -czf dist/${{ matrix.target }}/alpine-xfce-rootfs.tar.gz -C rootfs .
          sudo chown "$USER:" dist/${{ matrix.target }}/alpine-xfce-rootfs.tar.gz
          ls -lh dist/${{ matrix.target }}/

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.target }}
          path: dist/${{ matrix.target }}/

  release:
    name: Create GitHub Release
    needs: build-rootfs
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          merge-multiple: false
          path: dist/

      - name: Stage release assets
        run: |
          mkdir -p release
          for arch_dir in dist/*/; do
            arch=$(basename "$arch_dir")
            zip -j "release/vpc-${arch}.zip" "${arch_dir}"*
          done
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: VPC Binaries ${{ github.event.inputs.version }}
          body: |
            proot binaries and Alpine XFCE rootfs for Autobrowse Android Virtual PC.

            Contents per ABI:
            - `proot` from Termux
            - `libtalloc.so.2` and `libandroid-shmem.so` from Termux
            - `alpine-xfce-rootfs.tar.gz` preloaded with XFCE, TigerVNC, noVNC, and websockify
          files: release/*.zip
